name: Scraping franquias ABF

on:
  schedule:
    - cron: '0 8 1 * *'  # Dia 1 de cada mês às 8h UTC
  workflow_dispatch:
    inputs:
      segmento:
        description: 'Segmento específico (ex: alimentacao). Vazio = todos.'
        required: false
        default: ''
      limit:
        description: 'Limite de franquias por segmento (vazio = sem limite)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r api/requirements.txt

      - name: Criar banco temporário
        working-directory: api
        run: python3 database.py

      - name: Executar scraper
        id: scrape
        working-directory: api
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.segmento }}" ]; then
            ARGS="$ARGS --segmento ${{ github.event.inputs.segmento }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python3 scrapers/franquias_abf.py $ARGS 2>&1 | tee scrape-output.log

      - name: Enriquecer franquias (segmentos e sites)
        working-directory: api
        run: python3 scrapers/enriquecer_franquias.py --etapa 2 2>&1 | tee -a scrape-output.log

      - name: Criar issue se falhou
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let logContent = 'Log não disponível';
            try {
              logContent = fs.readFileSync('api/scrape-output.log', 'utf8').slice(-3000);
            } catch {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scraping franquias falhou — ${new Date().toISOString().slice(0, 10)}`,
              body: `## Erro no scraping de franquias\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n### Log\n\`\`\`\n${logContent}\n\`\`\`\n`,
              labels: ['bug', 'scraping']
            });
