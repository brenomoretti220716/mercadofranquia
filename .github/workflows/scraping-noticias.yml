name: Scraping e processamento de noticias

on:
  schedule:
    - cron: '0 */4 * * *'  # A cada 4 horas
  workflow_dispatch: {}

jobs:
  noticias:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r api/requirements.txt

      - name: Criar banco temporario
        working-directory: api
        run: python3 database.py

      - name: Coletar noticias
        working-directory: api
        run: python3 scrapers/noticias.py 2>&1 | tee noticias-output.log

      - name: Processar com IA
        if: success()
        working-directory: api
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scrapers/processar_noticias.py --limite 10 2>&1 | tee -a noticias-output.log

      - name: Criar issue se falhou
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let logContent = 'Log nao disponivel';
            try {
              logContent = fs.readFileSync('api/noticias-output.log', 'utf8').slice(-3000);
            } catch {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scraping noticias falhou — ${new Date().toISOString().slice(0, 10)}`,
              body: `## Erro no pipeline de noticias\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n### Log\n\`\`\`\n${logContent}\n\`\`\`\n`,
              labels: ['bug', 'noticias']
            });
