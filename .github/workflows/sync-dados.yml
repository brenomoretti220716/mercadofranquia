name: Sync dados BCB e IBGE

on:
  schedule:
    - cron: '0 10 * * 1'  # Toda segunda-feira às 10h UTC
  workflow_dispatch: {}     # Permite execução manual

jobs:
  sync-bcb-ibge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r api/requirements.txt

      - name: Criar banco temporário e executar sync
        id: sync
        working-directory: api
        run: |
          python3 database.py
          python3 sync.py 2>&1 | tee sync-output.log
          echo ""
          echo "=== RESUMO ==="
          echo "Sync finalizado em $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Criar issue se falhou
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let logContent = 'Log não disponível';
            try {
              logContent = fs.readFileSync('api/sync-output.log', 'utf8').slice(-3000);
            } catch {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Sync BCB/IBGE falhou — ${new Date().toISOString().slice(0, 10)}`,
              body: `## Erro no sync automático\n\n**Workflow:** ${context.workflow}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n### Log de erro\n\`\`\`\n${logContent}\n\`\`\`\n`,
              labels: ['bug', 'sync']
            });
